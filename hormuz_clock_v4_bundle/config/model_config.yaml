version: 4
clock:
  t0_utc: '2026-02-28T00:00:00Z'
  dial_days: 180
  minute_hand_days: 90
  hour_hand_days: 30
  structural_bar_days: 450
states:
  transit_flow:
    thresholds: {normal: 0.80, stressed: 0.60, degraded: 0.30, impaired: 0.10}
    semantics: proportion_of_baseline_transits
  attack_tempo:
    thresholds: {normal: 0, stressed: 1, degraded: 2, impaired: 3}
    semantics: successful_or_confirmed_significant_attacks_per_7d
  insurance_availability:
    thresholds: {normal: 0, stressed: 1, degraded: 2, impaired: 3}
    semantics: ordinal_market_condition
  navigation_integrity:
    thresholds: {normal: 0, stressed: 1, degraded: 2, impaired: 3}
    semantics: ordinal_jamming_spoofing_disruption_condition
  bypass_capacity:
    thresholds: {normal: 0.80, stressed: 0.60, degraded: 0.40, impaired: 0.20}
    semantics: available_bypass_capacity_divided_by_hormuz_normal_flow
  asia_buffer_stress:
    thresholds: {normal: 0, stressed: 1, degraded: 2, impaired: 3}
    semantics: importer_stock_and_rationing_pressure_ordinal
branches:
  reopening: {center: 0.25, low: 0.15, high: 0.35, confidence: 0.40}
  effective_closure: {center: 0.55, low: 0.45, high: 0.65, confidence: 0.45}
  wider_escalation: {center: 0.20, low: 0.10, high: 0.30, confidence: 0.35}
signal_categories:
  insurance_availability:
    semantics: war_risk_cover_cost_and_capacity
    note: impaired can mean cover remains available but only at extreme cost
  reopening_pressure:
    semantics: explicit public planning or diplomatic motion toward resumed protected transits
    experimental: true
  regional_escalation:
    semantics: conflict spreading beyond shipping into regional energy or civilian infrastructure
    experimental: true
branch_model:
  version: weighted-state-ranges-v1
  base:
    reopening: 0.58
    effective_closure: 0.42
    wider_escalation: 0.22
  state_weights:
    reopening:
      transit_flow: -0.09
      attack_tempo: -0.08
      insurance_availability: -0.04
      navigation_integrity: -0.04
      bypass_capacity: -0.03
      asia_buffer_stress: -0.02
    effective_closure:
      transit_flow: 0.14
      attack_tempo: 0.10
      insurance_availability: 0.06
      navigation_integrity: 0.05
      bypass_capacity: 0.04
      asia_buffer_stress: -0.02
    wider_escalation:
      transit_flow: 0.02
      attack_tempo: 0.07
      insurance_availability: 0.02
      navigation_integrity: 0.03
      bypass_capacity: 0.01
      asia_buffer_stress: 0.01
  signal_adjustments:
    reopening_pressure:
      reopening: 0.08
      effective_closure: -0.04
      wider_escalation: -0.04
    regional_escalation:
      reopening: -0.04
      effective_closure: 0.02
      wider_escalation: 0.08
  uncertainty:
    range_floor: 0.07
    range_scale: 0.16
    range_ceiling: 0.22
    confidence_floor: 0.25
    confidence_scale: 0.50
    confidence_ceiling: 0.85
    experimental_penalty_scale: 0.10
buffer_windows:
  - {start_day: 15, end_day: 25, label: 'Shipping pipeline'}
  - {start_day: 25, end_day: 40, label: 'Refinery adjustment'}
  - {start_day: 40, end_day: 60, label: 'SPR / reserve decision'}
  - {start_day: 60, end_day: 90, label: 'Shortage cascade risk'}
rewind_triggers:
  - 'No successful attacks for 72h+'
  - 'Broad war-risk cover returns'
  - 'GNSS/AIS disruption materially drops'
  - 'Tanker transits recover for 3-7 days'
