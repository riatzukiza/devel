    <g fill="#c8871f" opacity="0.75">
      <circle cx="320" cy="690" r="8"/>
      <circle cx="360" cy="735" r="7"/>
      <circle cx="420" cy="640" r="8"/>
      <circle cx="470" cy="760" r="7"/>
      <circle cx="535" cy="665" r="9"/>
      <circle cx="595" cy="750" r="7"/>
      <circle cx="650" cy="655" r="8"/>
