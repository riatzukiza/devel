<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Taco illustration</title>
  <desc id="desc">A colorful cartoon taco with shell, lettuce, tomato, cheese, and meat.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="100%" stop-color="#ffe7bf"/>
    </linearGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6d35f"/>
      <stop offset="100%" stop-color="#d79a28"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#ad7a20" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <ellipse cx="512" cy="785" rx="300" ry="58" fill="#e7c58a" opacity="0.55"/>

