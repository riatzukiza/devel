      <path d="M410 610 l40 -48 l25 15 l-52 60 z"/>
      <path d="M495 610 l32 -42 l28 14 l-44 55 z"/>
      <path d="M575 610 l34 -44 l25 12 l-45 58 z"/>
      <path d="M650 605 l35 -36 l25 14 l-50 49 z"/>
      <path d="M372 655 l42 -35 l25 12 l-54 45 z"/>
      <path d="M462 660 l35 -38 l24 12 l-44 50 z"/>
      <path d="M555 660 l35 -36 l24 11 l-45 49 z"/>
      <path d="M635 652 l37 -31 l22 10 l-45 40 z"/>
