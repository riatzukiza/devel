      <circle cx="405" cy="515" r="24"/>
      <circle cx="470" cy="550" r="23"/>
      <circle cx="545" cy="500" r="26"/>
      <circle cx="610" cy="548" r="24"/>
      <circle cx="675" cy="525" r="25"/>
