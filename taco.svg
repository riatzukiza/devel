      <ellipse cx="445" cy="608" rx="44" ry="24"/>
      <ellipse cx="530" cy="640" rx="50" ry="28"/>
      <ellipse cx="615" cy="615" rx="45" ry="24"/>
      <ellipse cx="690" cy="640" rx="42" ry="24"/>
      <ellipse cx="405" cy="685" rx="46" ry="26"/>
