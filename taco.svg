    <path d="M790 755 C790 580 666 455 512 455 C358 455 234 580 234 755 C234 755 324 706 512 706 C700 706 790 755 790 755 Z" fill="url(#shell)"/>
    <path d="M758 741 C758 589 650 485 512 485 C374 485 266 589 266 741 C266 741 351 700 512 700 C673 700 758 741 758 741 Z" fill="#f0c34b" opacity="0.55"/>

