      PROXX_CONNECTION_TIMEOUT_MS: ${PROXX_CONNECTION_TIMEOUT_MS:-15000}
      PROXX_SOCKET_TIMEOUT_MS: ${PROXX_SOCKET_TIMEOUT_MS:-180000}
      OPENPLANNER_BASE_URL: ${KNOXX_OPENPLANNER_BASE_URL:-http://openplanner:7777}
      OPENPLANNER_API_KEY: ${KNOXX_OPENPLANNER_API_KEY:-change-me}
      WORKSPACE_PATH: /app/workspace/devel
      INGEST_SCHEDULER_POLL_MS: ${INGEST_SCHEDULER_POLL_MS:-15000}
      PASSIVE_WATCH_ENABLED: ${PASSIVE_WATCH_ENABLED:-true}
      PASSIVE_WATCH_POLL_MS: ${PASSIVE_WATCH_POLL_MS:-15000}
      PASSIVE_WATCH_DEBOUNCE_MS: ${PASSIVE_WATCH_DEBOUNCE_MS:-1000}
      INGEST_BATCH_SIZE: ${INGEST_BATCH_SIZE:-24}
      INGEST_BATCH_PARALLELISM: ${INGEST_BATCH_PARALLELISM:-2}
      INGEST_THROTTLE_ENABLED: ${INGEST_THROTTLE_ENABLED:-true}
      INGEST_MAX_LOAD_PER_CORE: ${INGEST_MAX_LOAD_PER_CORE:-1.35}
      INGEST_THROTTLE_SLEEP_MS: ${INGEST_THROTTLE_SLEEP_MS:-500}
      INGEST_BATCH_DELAY_MS: ${INGEST_BATCH_DELAY_MS:-1000}
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - ${WORKSPACE_PATH:-../../..}:/app/workspace:ro
    depends_on:
      knoxx-postgres:
        condition: service_healthy
      knoxx-redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3003/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
    - knoxx-internal
    - ai-infra
    user: ${DOCKER_USER:-1000:1000}
  knoxx-postgres:
    image: postgres:16-alpine
    cpus: 1
    cpuset: 2-21
    expose:
    - '5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kms}
      POSTGRES_DB: ${POSTGRES_DB:-futuresight_kms}
    volumes:
    - knoxx-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-kms} -d ${POSTGRES_DB:-futuresight_kms}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
    - knoxx-internal
  knoxx-redis:
    image: redis:7-alpine
    cpus: 0.5
    cpuset: 2-21
    expose:
    - '6379'
    volumes:
    - knoxx-redis-data:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
    - knoxx-internal
volumes:
  openplanner-mongodb-data: null
  shuvcrawl-data: null
  shuvcrawl-output: null
  knoxx-postgres-data: null
  knoxx-redis-data: null
  knoxx-models: null
  knoxx-runs: null
  knoxx-backend-node-modules: null
  knoxx-backend-shadow-cljs: null
  knoxx-backend-dist: null
  knoxx-backend-m2: null
  knoxx-frontend-node-modules: null
  knoxx-knoxx-node-modules: null
  shibboleth-data: null
  km-labels-data: null
networks:
  ai-infra:
    external: true
    name: ai-infra
  knoxx-internal:
    driver: bridge
