services:
  secrets-init:
    image: python:3.12-alpine
    command:
    - /bin/sh
    - -lc
    - "set -eu\nmkdir -p /runtime-secrets\npython - <<'PY'\nimport base64, os, pathlib\n\
      root = pathlib.Path('/runtime-secrets')\nroot.mkdir(parents=True, exist_ok=True)\n\
      keyfile = root / 'mongodb-keyfile'\npassword_file = root / 'mongot-password'\n\
      if not keyfile.exists():\n    keyfile.write_text(base64.b64encode(os.urandom(756)).decode('ascii'))\n\
      if not password_file.exists():\n    password_file.write_text(os.environ.get('MONGOT_SYNC_PASSWORD',\
      \ '<password>'))\nos.chmod(keyfile, 0o400)\nos.chmod(password_file,\
      \ 0o400)\ntry:\n    os.chown(keyfile, 998, 998)\nexcept PermissionError:\n \
      \   pass\nPY\n"
    environment:
      MONGOT_SYNC_PASSWORD: ${MONGOT_SYNC_PASSWORD:-<password>}
    volumes:
    - ./runtime-secrets:/runtime-secrets
    user: 0:0
  vexx:
    profiles:
    - container-vexx
    build:
      context: ../../orgs/open-hax/openplanner/packages/vexx
      dockerfile: Dockerfile
    cpus: 1
    cpuset: 2-21
    ports:
    - 127.0.0.1:${VEXX_HOST_PORT:-8787}:8788
    environment:
      VEXX_HOST: 0.0.0.0
      VEXX_PORT: '8788'
      VEXX_DEVICE: ${VEXX_DEVICE:-NPU}
      VEXX_AUTO_ORDER: ${VEXX_AUTO_ORDER:-NPU,GPU,CPU}
      VEXX_REQUIRE_ACCEL: ${VEXX_REQUIRE_ACCEL:-true}
      VEXX_PAIR_CACHE_MAX_ENTRIES: ${VEXX_PAIR_CACHE_MAX_ENTRIES:-250000}
    devices:
    - /dev/accel:/dev/accel
    - /dev/dri:/dev/dri
    volumes:
    - /lib/x86_64-linux-gnu/libze_loader.so.1.24.2:/lib/x86_64-linux-gnu/libze_loader.so.1.8.0:ro
    - /lib/x86_64-linux-gnu/libze_intel_npu.so:/lib/x86_64-linux-gnu/libze_intel_npu.so:ro
    - /lib/x86_64-linux-gnu/libze_intel_npu.so.1:/lib/x86_64-linux-gnu/libze_intel_npu.so.1:ro
    - /lib/x86_64-linux-gnu/libze_intel_npu.so.1.28.0:/lib/x86_64-linux-gnu/libze_intel_npu.so.1.28.0:ro
    - /lib/x86_64-linux-gnu/libstdc++.so.6.0.33:/lib/x86_64-linux-gnu/libstdc++.so.6.0.30:ro
    healthcheck:
      test:
      - CMD
      - curl
      - -fsS
      - http://127.0.0.1:8788/v1/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      default: {}
      ai-infra:
        aliases:
        - vexx
    user: ${DOCKER_USER:-1000:1000}
  mongodb:
    image: mongodb/mongodb-community-server:8.2.0-ubi9
    command:
    - mongod
    - --config
    - /etc/mongod.conf
    cpus: 1
    cpuset: 2-21
    ports:
    - 127.0.0.1:${OPENPLANNER_MONGODB_PORT:-27017}:27017
    environment:
      MONGODB_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME:-openplannerRoot}
      MONGODB_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-<password>}
    volumes:
    - openplanner-mongodb-data:/data/db
    - ./config/mongod.conf:/etc/mongod.conf:ro
    - ./runtime-secrets:/etc/mongodb-secrets:ro
    healthcheck:
      test:
      - CMD
      - mongosh
      - --eval
      - db.adminCommand('ping')
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      default: {}
      ai-infra:
        aliases:
        - openplanner-mongodb
  mongot:
    image: mongodb/mongodb-community-search:0.55.0
    cpus: 1
    cpuset: 2-21
    depends_on:
      secrets-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    entrypoint:
    - /mongot-community/mongot
    - --config
    - /etc/mongot/mongot.yml
    ports:
    - 127.0.0.1:${OPENPLANNER_MONGOT_PORT:-27028}:27028
    volumes:
    - ./config/mongot.yml:/etc/mongot/mongot.yml:ro
    - ./runtime-secrets:/etc/mongot/secrets:ro
    tmpfs:
    - /var/lib/mongot:size=4g,uid=998,gid=998,mode=0755
    restart: unless-stopped
    networks:
      default: {}
      ai-infra: {}
  mongo-init:
    image: mongodb/mongodb-community-server:8.2.0-ubi9
    depends_on:
      secrets-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
    entrypoint:
    - /bin/sh
    - -lc
    - "set -eu\nuntil mongosh --host mongodb -u \"${MONGODB_ROOT_USERNAME:-openplannerRoot}\"\
      \ -p \"${MONGODB_ROOT_PASSWORD:-<password>}\" --authenticationDatabase\
      \ admin --quiet --eval 'db.adminCommand({ ping: 1 })' >/dev/null 2>&1; do\n\
      \  sleep 2\ndone\nmongosh --host mongodb -u \"${MONGODB_ROOT_USERNAME:-openplannerRoot}\"\
      \ -p \"${MONGODB_ROOT_PASSWORD:-<password>}\" --authenticationDatabase\
      \ admin --quiet <<EOF\ntry {\n  rs.status();\n} catch (e) {\n  rs.initiate({\
      \ _id: \"rs0\", members: [{ _id: 0, host: \"mongodb:27017\" }] });\n}\n\nfor\
      \ (let i = 0; i < 30; i += 1) {\n  const hello = db.adminCommand({ hello: 1\
      \ });\n  if (hello.isWritablePrimary === true) break;\n  sleep(1000);\n}\n\n\
      const admin = db.getSiblingDB('admin');\nconst existing = admin.getUser('mongotUser');\n\
      if (!existing) {\n  admin.createUser({\n    user: 'mongotUser',\n    pwd: '${MONGOT_SYNC_PASSWORD:-<password>}',\n\
      \    roles: [{ role: 'searchCoordinator', db: 'admin' }]\n  });\n}\n\nconst\
      \ appDb = db.getSiblingDB('${MONGODB_DB:-openplanner}');\nconst appExisting\
      \ = appDb.getUser('${OPENPLANNER_MONGO_APP_USERNAME:-openplanner}');\nif (!appExisting)\
      \ {\n  appDb.createUser({\n    user: '${OPENPLANNER_MONGO_APP_USERNAME:-openplanner}',\n\
      \    pwd: '${OPENPLANNER_MONGO_APP_PASSWORD:-<password>}',\n\
      \    roles: [{ role: 'readWrite', db: '${MONGODB_DB:-openplanner}' }]\n  });\n\
      }\nEOF\n"
    environment:
      MONGODB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME:-openplannerRoot}
      MONGODB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-<password>}
      MONGODB_DB: ${MONGODB_DB:-openplanner}
      OPENPLANNER_MONGO_APP_USERNAME: ${OPENPLANNER_MONGO_APP_USERNAME:-openplanner}
      OPENPLANNER_MONGO_APP_PASSWORD: ${OPENPLANNER_MONGO_APP_PASSWORD:-<password>}
      MONGOT_SYNC_PASSWORD: ${MONGOT_SYNC_PASSWORD:-<password>}
    restart: 'no'
    networks:
      default: {}
      ai-infra: {}
  openplanner:
    build:
      context: ../../orgs/open-hax/openplanner
      dockerfile: Dockerfile
    cpus: 2
    cpuset: 2-21
    depends_on:
      secrets-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      mongot:
        condition: service_started
      mongo-init:
        condition: service_completed_successfully
    ports:
    - 127.0.0.1:${OPENPLANNER_PORT:-7777}:7777
    environment:
      NODE_ENV: production
      OPENPLANNER_HOST: 0.0.0.0
      OPENPLANNER_PORT: '7777'
      OPENPLANNER_API_KEY: ${OPENPLANNER_API_KEY:-change-me}
      OPENPLANNER_DATA_DIR: /app/openplanner-lake
      OPENPLANNER_STORAGE_BACKEND: mongodb
      MONGODB_URI: ${MONGODB_URI:-mongodb://openplanner:<password>@mongodb:27017/openplanner?replicaSet=rs0&authSource=openplanner}
      MONGODB_DB: ${MONGODB_DB:-openplanner}
      MONGODB_EVENTS_COLLECTION: ${MONGODB_EVENTS_COLLECTION:-events}
      MONGODB_COMPACTED_COLLECTION: ${MONGODB_COMPACTED_COLLECTION:-compacted_memories}
      MONGODB_VECTOR_HOT_COLLECTION: ${MONGODB_VECTOR_HOT_COLLECTION:-event_chunks}
      MONGODB_VECTOR_COMPACT_COLLECTION: ${MONGODB_VECTOR_COMPACT_COLLECTION:-compacted_vectors}
      MONGODB_GRAPH_LAYOUT_COLLECTION: ${MONGODB_GRAPH_LAYOUT_COLLECTION:-graph_layout_overrides}
      MONGODB_GRAPH_NODE_EMBEDDING_COLLECTION: ${MONGODB_GRAPH_NODE_EMBEDDING_COLLECTION:-graph_node_embeddings}
      MONGODB_EVENTS_TTL_SECONDS: ${MONGODB_EVENTS_TTL_SECONDS:-0}
      MONGODB_COMPACTED_TTL_SECONDS: ${MONGODB_COMPACTED_TTL_SECONDS:-0}
      EMBED_PROVIDER_BASE_URL: ${EMBED_PROVIDER_BASE_URL:-http://host.docker.internal:8789}
      EMBED_PROVIDER_API_KEY: ${EMBED_PROVIDER_API_KEY:-${OPEN_HAX_OPENAI_PROXY_AUTH_TOKEN:-}}
      EMBED_PROVIDER_MODEL: ${EMBED_PROVIDER_MODEL:-qwen3-embedding:0.6b}
      EMBED_PROVIDER_COMPACT_MODEL: ${EMBED_PROVIDER_COMPACT_MODEL:-qwen3-embedding:4b}
      EMBED_PROVIDER_MODEL_BY_SOURCE: ${EMBED_PROVIDER_MODEL_BY_SOURCE:-}
      EMBED_PROVIDER_MODEL_BY_KIND: ${EMBED_PROVIDER_MODEL_BY_KIND:-}
      EMBED_PROVIDER_MODEL_BY_PROJECT: ${EMBED_PROVIDER_MODEL_BY_PROJECT:-}
      EMBED_PROVIDER_BATCH_WINDOW_MS: ${EMBED_PROVIDER_BATCH_WINDOW_MS:-5}
      EMBED_PROVIDER_MAX_BATCH_ITEMS: ${EMBED_PROVIDER_MAX_BATCH_ITEMS:-32}
      EMBED_PROVIDER_CACHE_PATH: ${EMBED_PROVIDER_CACHE_PATH:-/app/openplanner-lake/cache/embed-provider-cache.jsonl}
      VEXX_BASE_URL: ${VEXX_BASE_URL:-http://host.docker.internal:8787}
      VEXX_API_KEY: ${VEXX_API_KEY:-}
      VEXX_DEVICE: ${VEXX_DEVICE:-NPU}
      VEXX_REQUIRE_ACCEL: ${VEXX_REQUIRE_ACCEL:-true}
      VEXX_ENFORCE: ${VEXX_ENFORCE:-true}
      VEXX_MIN_CANDIDATES: ${VEXX_MIN_CANDIDATES:-1}
      VEXX_TIMEOUT_MS: ${VEXX_TIMEOUT_MS:-30000}
    volumes:
    - ./openplanner-lake:/app/openplanner-lake
    extra_hosts:
    - host.docker.internal:host-gateway
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - fetch('http://127.0.0.1:7777/v1/health').then((response) => { if (!response.ok)
        { process.exit(1); } }).catch(() => process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      default: {}
      ai-infra:
        aliases:
        - openplanner
  graph-weaver:
    profiles:
    - graph
    - graph-2
    - graph-3
    image: node:22-bookworm
    cpus: 2
    cpuset: 2-21
    working_dir: /app/workspace/devel/orgs/open-hax/openplanner/packages/graph-weaver
    command: bash -lc "corepack enable && pnpm install && npx tsx src/server.ts"
    expose:
    - '8796'
    ports:
    - 127.0.0.1:${GRAPH_WEAVER_PORT:-8796}:8796
    environment:
      HOST: 0.0.0.0
      PORT: '8796'
      REPO_ROOT: /app/workspace/devel
      GRAPH_WEAVER_LOCAL_SOURCE: ${GRAPH_WEAVER_LOCAL_SOURCE:-openplanner-graph}
      GRAPH_WEAVER_PERSISTENCE_MODE: ${GRAPH_WEAVER_PERSISTENCE_MODE:-openplanner}
      GRAPH_WEAVER_INCLUDE_WEB_LAYER_WHEN_IDLE: ${GRAPH_WEAVER_INCLUDE_WEB_LAYER_WHEN_IDLE:-true}
      GRAPH_WEAVER_INCLUDE_SEMANTIC_EDGES: ${GRAPH_WEAVER_INCLUDE_SEMANTIC_EDGES:-true}
      GRAPH_WEAVER_SEMANTIC_MIN_SIMILARITY: ${GRAPH_WEAVER_SEMANTIC_MIN_SIMILARITY:-0.8}
      GRAPH_WEAVER_OPENPLANNER_PROJECTS: ${GRAPH_WEAVER_OPENPLANNER_PROJECTS:-devel,web,bluesky,knoxx-session}
      WEBGL_GRAPH_VIEW_DIST: /app/workspace/devel/packages/webgl-graph-view/dist
      STATE_DIR: /app/workspace/devel/services/openplanner/openplanner-lake/graph-weaver
      MONGODB_URI: ${MONGODB_URI:-mongodb://openplanner:<password>@mongodb:27017/openplanner?replicaSet=rs0&authSource=openplanner}authSource=openplanner}
      MONGODB_DB: ${MONGODB_DB:-openplanner}
      MONGODB_NODE_COLLECTION: ${GRAPH_WEAVER_NODE_COLLECTION:-graph_weaver_nodes}
      MONGODB_EDGE_COLLECTION: ${GRAPH_WEAVER_EDGE_COLLECTION:-graph_weaver_edges}
      OPENPLANNER_BASE_URL: http://openplanner:7777
      OPENPLANNER_API_KEY: ${OPENPLANNER_API_KEY:-change-me}
      GRAPH_WEAVER_WEB_CRAWL_ENABLED: ${GRAPH_WEAVER_WEB_CRAWL_ENABLED:-false}
      MAX_RENDER_NODES: ${GRAPH_WEAVER_MAX_RENDER_NODES:-6000}
      MAX_RENDER_EDGES: ${GRAPH_WEAVER_MAX_RENDER_EDGES:-12000}
      SCAN_MAX_FILE_BYTES: ${GRAPH_WEAVER_SCAN_MAX_FILE_BYTES:-512000}
      SCAN_RESCAN_INTERVAL_MS: ${GRAPH_WEAVER_SCAN_RESCAN_INTERVAL_MS:-30000}
    volumes:
    - ${DEVEL_ROOT_PATH:-../..}:/app/workspace/devel
    extra_hosts:
    - host.docker.internal:host-gateway
    depends_on:
      openplanner:
        condition: service_started
      mongo-init:
        condition: service_completed_successfully
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - fetch('http://127.0.0.1:8796/api/status').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      default: {}
      ai-infra: {}
    user: ${DOCKER_USER:-1000:1000}
  eros-eris-field-app:
    profiles:
    - graph
    image: node:22-bookworm
    cpus: 1.5
    cpuset: 2-21
    working_dir: /app/workspace/devel
    command: bash -lc "corepack enable && pnpm -C orgs/open-hax/openplanner/packages/eros-eris-field-app
      dev"
    environment:
      CI: 'true'
      NPM_CONFIG_CONFIRM_MODULES_PURGE: 'false'
      NODE_OPTIONS: --use-openssl-ca
