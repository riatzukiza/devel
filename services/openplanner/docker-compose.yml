      EMBED_PROVIDER_MODEL: ${EROS_ERIS_EMBED_PROVIDER_MODEL:-qwen3-embedding:0.6b}
      VEXX_BASE_URL: ${VEXX_BASE_URL:-http://host.docker.internal:8787}
