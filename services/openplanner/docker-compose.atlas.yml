services:
  secrets-init:
    image: busybox:1.36
    command:
    - echo
    - 'Atlas Local: secrets-init skipped'
    volumes: []
    user: 0:0
  mongodb:
    image: mongodb/mongodb-atlas-local:latest
    command: []
    ports:
    - 127.0.0.1:${OPENPLANNER_MONGODB_PORT:-27017}:27017
    environment:
      MONGODB_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME:-openplannerRoot}
      MONGODB_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-change-me-root-password}
    volumes:
    - openplanner-atlas-data:/data/db
    healthcheck:
      test:
      - CMD
      - mongosh
      - --eval
      - db.adminCommand('ping')
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
  mongot:
    image: busybox:1.36
    command:
    - sleep
    - infinity
    depends_on: {}
    entrypoint: []
    ports: []
    volumes: []
    tmpfs: []
    healthcheck:
      test:
      - CMD
      - 'true'
      interval: 60s
      timeout: 5s
      retries: 1
  mongo-init:
    image: mongodb/mongodb-community-server:8.2.0-ubi9
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint:
    - /bin/sh
    - /scripts/atlas-init.sh
    environment:
      MONGODB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME:-openplannerRoot}
      MONGODB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-change-me-root-password}
      MONGODB_DB: ${MONGODB_DB:-openplanner}
      OPENPLANNER_MONGO_APP_USERNAME: ${OPENPLANNER_MONGO_APP_USERNAME:-openplanner}
      OPENPLANNER_MONGO_APP_PASSWORD: ${OPENPLANNER_MONGO_APP_PASSWORD:-change-me-openplanner-password}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
    volumes:
    - ./scripts/atlas-init.sh:/scripts/atlas-init.sh:ro
    restart: 'no'
  openplanner:
    depends_on:
      secrets-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    environment:
      MONGODB_URI: mongodb://${OPENPLANNER_MONGO_APP_USERNAME:-openplanner}:${OPENPLANNER_MONGO_APP_PASSWORD:-change-me-openplanner-password}@mongodb:27017/${MONGODB_DB:-openplanner}?authSource=${MONGODB_DB:-openplanner}
    user: ${DOCKER_USER:-1000:1000}
volumes:
  openplanner-atlas-data: null
