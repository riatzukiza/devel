# OpenPlanner Atlas Local deployment overlay
#
# Replaces the Community Search (mongodb + mongot) containers with
# mongodb/mongodb-atlas-local, which includes the AtlasCLI control plane
# wiring required for createSearchIndexes / $listSearchIndexes / $vectorSearch.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.atlas.yml up -d
#
# This overlay:
#   - Replaces the mongodb service image with mongodb-atlas-local
#   - Removes the mongot service (built into atlas-local)
#   - Replaces mongo-init with atlas-init (users + vector index creation)
#   - Removes the secrets-init service (not needed with atlas-local)
#
# Data migration from Community → Atlas Local:
#   See docs/deployment/production-vector-search.md for the full runbook.
#   TL;DR: mongodump → mongorestore into atlas-mongodb, then run atlas-init.

services:
  # ── Replace secrets-init with a no-op ─────────────────────────────
  # Atlas Local doesn't need keyfile/mongot-password generation
  secrets-init:
    image: busybox:1.36
    command: ["echo", "Atlas Local: secrets-init skipped"]
    volumes: []

  # ── Replace mongodb with Atlas Local ──────────────────────────────
  mongodb:
    image: mongodb/mongodb-atlas-local:latest
    command: []                    # use the image default entrypoint
    ports:
      - "127.0.0.1:${OPENPLANNER_MONGODB_PORT:-27017}:27017"
    environment:
      MONGODB_INITDB_ROOT_USERNAME: "${MONGODB_ROOT_USERNAME:-openplannerRoot}"
      MONGODB_INITDB_ROOT_PASSWORD: "${MONGODB_ROOT_PASSWORD:-change-me-root-password}"
    volumes:
      - openplanner-atlas-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    # Remove the config/mongod.conf mount and secrets that Community needed
    # (Atlas Local manages its own config internally)

  # ── Remove mongot (built into Atlas Local) ────────────────────────
  mongot:
    image: busybox:1.36
    command: ["sleep", "infinity"]
    depends_on: {}
    entrypoint: []
    ports: []
    volumes: []
    tmpfs: []
    healthcheck:
      test: ["CMD", "true"]
      interval: 60s
      timeout: 5s
      retries: 1

  # ── Replace mongo-init with atlas-init ────────────────────────────
  # Creates app user + vector search indexes via mounted script
  mongo-init:
    image: mongodb/mongodb-community-server:8.2.0-ubi9
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/atlas-init.sh"]
    environment:
      MONGODB_ROOT_USERNAME: "${MONGODB_ROOT_USERNAME:-openplannerRoot}"
      MONGODB_ROOT_PASSWORD: "${MONGODB_ROOT_PASSWORD:-change-me-root-password}"
      MONGODB_DB: "${MONGODB_DB:-openplanner}"
      OPENPLANNER_MONGO_APP_USERNAME: "${OPENPLANNER_MONGO_APP_USERNAME:-openplanner}"
      OPENPLANNER_MONGO_APP_PASSWORD: "${OPENPLANNER_MONGO_APP_PASSWORD:-change-me-openplanner-password}"
      EMBEDDING_DIMENSIONS: "${EMBEDDING_DIMENSIONS:-1024}"
    volumes:
      - ./scripts/atlas-init.sh:/scripts/atlas-init.sh:ro
    restart: "no"

  # ── Update openplanner to use simpler URI ─────────────────────────
  # Atlas Local may not use the same replicaSet name as Community
  openplanner:
    depends_on:
      secrets-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    environment:
      MONGODB_URI: "mongodb://${OPENPLANNER_MONGO_APP_USERNAME:-openplanner}:${OPENPLANNER_MONGO_APP_PASSWORD:-change-me-openplanner-password}@mongodb:27017/${MONGODB_DB:-openplanner}?authSource=${MONGODB_DB:-openplanner}"

volumes:
  openplanner-atlas-data:
