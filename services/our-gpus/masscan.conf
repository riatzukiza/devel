# masscan configuration for our-gpus
# Scans public IPv4 space for Ollama API servers (port 11434)
# Usage: masscan -c masscan.conf -p11434 <IP-RANGE> -oJ results.json

# Target port(s) - Ollama default API port
ports = 11434

# Rate: conservative to avoid ISP/network filtering
rate = 100000

# Output format: JSON for easy parsing
output-format = json
output-filename = scan-results.json

# Resume capability
resume = scan-progress.conf

# Exclude ranges (complaints, special-use, military, research networks)
exclude = excludes.conf

# Interface (leave unset to auto-detect)
# interface = eth0

# Source IP (leave unset to auto-detect)
# router-ip = 10.0.0.1

# Ping sweep first to find live hosts (disabled by default for speed)
# ping = true

# TTL for outgoing packets
# ttl = 64

# Wait time after scan completes
wait = 15

# Retries
retries = 3
