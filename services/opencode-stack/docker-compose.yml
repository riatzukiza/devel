services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${OPENCODE_RAW_PORT:-4098}:4096"
      - "127.0.0.1:${OPENCODE_PORT:-8789}:4180"
      - "127.0.0.1:${OPENCODE_ADMIN_PORT:-4097}:4181"
    working_dir: /workspace
    environment:
      NODE_ENV: production
      WORKSPACE_ROOT: /workspace
      HOME: /home/err
      XDG_CONFIG_HOME: /home/err/.config
      XDG_DATA_HOME: /home/err/.local/share
      XDG_CACHE_HOME: /home/err/.cache
      XDG_STATE_HOME: /home/err/.local/state
      OPENCODE_STACK_DATA_DIR: /srv/opencode-stack-data
      OPENCODE_GATEWAY_DATA_DIR: /srv/opencode-stack-data
      OPENCODE_GATEWAY_PUBLIC_PORT: "4180"
      OPENCODE_GATEWAY_ADMIN_PORT: "4181"
      OPENCODE_UPSTREAM_URL: http://127.0.0.1:4096
      OPENCODE_GATEWAY_JANUS_URL: "${OPENCODE_GATEWAY_JANUS_URL:-http://mcp-stack:8788}"
      ETA_MU_UPSTREAM_URL: "${ETA_MU_UPSTREAM_URL:-http://host.docker.internal:8787}"
      ETA_MU_BASE_PATH: "${ETA_MU_BASE_PATH:-/eta-mu}"
      OPENCODE_CONFIG_DIR: /workspace/.opencode
      OPENPLANNER_URL: "${OPENPLANNER_URL:-http://host.docker.internal:7777}"
      OPENPLANNER_API_KEY: "${OPENPLANNER_API_KEY:-change-me}"
      OPEN_HAX_OPENAI_PROXY_AUTH_TOKEN: "${OPEN_HAX_OPENAI_PROXY_AUTH_TOKEN:-change-me-open-hax-proxy-token}"
      OLLAMA_URL: "${OLLAMA_URL:-http://host.docker.internal:8789}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:8789}"
    user: "1000:1000"
    volumes:
      - type: bind
        source: "${WORKSPACE_ROOT:-/home/err/devel}"
        target: /workspace
      - type: bind
        source: ./data
        target: /srv/opencode-stack-data
      - type: bind
        source: "${HOST_OPENCODE_CONFIG_DIR:-/home/err/.config/opencode}"
        target: /home/err/.config/opencode
      - type: bind
        source: "${HOST_OPENCODE_DATA_DIR:-/home/err/.local/share/opencode}"
        target: /home/err/.local/share/opencode
      - type: bind
        source: "${HOST_OPENCODE_CACHE_DIR:-/home/err/.cache/opencode}"
        target: /home/err/.cache/opencode
      - type: bind
        source: "${HOST_OPENCODE_STATE_DIR:-/home/err/.local/state/opencode}"
        target: /home/err/.local/state/opencode
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - mcp_stack
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4180/health').then((response)=>{ if (!response.ok) process.exit(1); }).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

networks:
  mcp_stack:
    name: mcp-stack_default
