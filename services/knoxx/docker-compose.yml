# FutureSight Knowledge Management System
#
# Isolated compose stack with nginx reverse proxy.
# All services are accessible through nginx on port 80.
#
# MVP: Start core services first, then add Ragussy/Shibboleth
#
# DEV MODE:
#   COMPOSE_PROFILES=dev docker compose up -d
#   This enables hot-reloading frontend dev server on port 5173
#   Nginx will route to the dev server automatically.

x-shared-env: &shared-env
  KNOXX_BASE_URL: ${KNOXX_BASE_URL:-http://knoxx-backend:8000}
  SHIBBOLETH_BASE_URL: ${SHIBBOLETH_BASE_URL:-http://shibboleth:3001}
  KM_LABELS_BASE_URL: http://km-labels:3002
  KM_LABELS_API_KEY: ${KM_LABELS_API_KEY:-change-me-km-labels}

services:
  # ============================================================
  # NGINX REVERSE PROXY
  # ============================================================
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: futuresight-kms-nginx
    cpus: 0.5
    cpuset: "2-21"
    environment:
      KNOXX_FRONTEND_UPSTREAM_HOST: ${KNOXX_FRONTEND_UPSTREAM_HOST:-knoxx-frontend}
      KNOXX_FRONTEND_UPSTREAM_PORT: ${KNOXX_FRONTEND_UPSTREAM_PORT:-80}
      SHUVCRAWL_API_TOKEN: ${SHUVCRAWL_API_TOKEN:-}
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${SHIBBOLETH_HTTP_PORT:-8097}:8088"
    depends_on:
      knoxx-backend:
        condition: service_healthy
      shibboleth-backend:
        condition: service_healthy
      km-labels:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - kms-internal
      - ai-infra

  # ============================================================
  # KNOXX BACKEND - RAG + inference API
  # ============================================================
  knoxx-backend:
    build:
      context: ${KNOXX_BACKEND_PATH:-../../orgs/open-hax/knoxx/backend}
      dockerfile: ${KNOXX_BACKEND_DOCKERFILE:-Dockerfile}
    cpus: 2
    cpuset: "2-21"
    working_dir: ${KNOXX_BACKEND_WORKDIR:-/app}
    command: ["bash", "-lc", "${KNOXX_BACKEND_COMMAND:-node src/server.mjs}"]
    expose:
      - "8000"
    environment:
      NODE_ENV: ${KNOXX_BACKEND_NODE_ENV:-production}
      APP_NAME: "Knoxx Backend CLJS"
      HOST: "0.0.0.0"
      PORT: "8000"
      WORKSPACE_PROJECT_NAME: ${WORKSPACE_PROJECT_NAME:-devel}
      KNOXX_SESSION_PROJECT_NAME: ${KNOXX_SESSION_PROJECT_NAME:-knoxx-session}
      KNOXX_COLLECTION_NAME: ${KNOXX_COLLECTION_NAME:-devel_docs}
      KNOXX_AGENT_DIR: /runs/knoxx-agent
      KNOXX_ADMIN_URL: http://localhost
      KNOXX_BASE_URL: http://localhost:8000
      KNOXX_API_KEY: ${KNOXX_API_KEY:-}
      MODEL_LAB_OPENAI_API_KEY: ${MODEL_LAB_OPENAI_API_KEY:-}
      KNOXX_DEFAULT_ROLE: ${KNOXX_DEFAULT_ROLE:-executive}
      PROXX_BASE_URL: ${PROXX_BASE_URL:-http://host.docker.internal:8789}
      PROXX_AUTH_TOKEN: ${PROXY_AUTH_TOKEN:-}
      PROXX_DEFAULT_MODEL: ${PROXX_DEFAULT_MODEL:-glm-5}
      KNOXX_THINKING_LEVEL: ${KNOXX_THINKING_LEVEL:-off}
      KNOXX_REASONING_MODEL_PREFIXES: ${KNOXX_REASONING_MODEL_PREFIXES:-glm-}
      PROXX_EMBED_MODEL: ${PROXX_EMBED_MODEL:-nomic-embed-text:latest}
      OPENPLANNER_BASE_URL: ${KNOXX_OPENPLANNER_BASE_URL:-http://nginx/api/openplanner}
      OPENPLANNER_API_KEY: ${KNOXX_OPENPLANNER_API_KEY:-change-me-openplanner}
      KNOXX_POLICY_DATABASE_URL: ${KNOXX_POLICY_DATABASE_URL:-postgresql://${POSTGRES_USER:-kms}:${POSTGRES_PASSWORD:-kms}@postgres:5432/${POSTGRES_DB:-futuresight_kms}}
      KNOXX_PRIMARY_ORG_SLUG: ${KNOXX_PRIMARY_ORG_SLUG:-open-hax}
      KNOXX_PRIMARY_ORG_NAME: ${KNOXX_PRIMARY_ORG_NAME:-Open Hax}
      KNOXX_PRIMARY_ORG_KIND: ${KNOXX_PRIMARY_ORG_KIND:-platform_owner}
      KNOXX_BOOTSTRAP_SYSTEM_ADMIN_EMAIL: ${KNOXX_BOOTSTRAP_SYSTEM_ADMIN_EMAIL:-system-admin@open-hax.local}
      KNOXX_BOOTSTRAP_SYSTEM_ADMIN_NAME: ${KNOXX_BOOTSTRAP_SYSTEM_ADMIN_NAME:-Knoxx System Admin}
      GMAIL_APP_EMAIL: ${GMAIL_APP_EMAIL:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      REDIS_URL: redis://redis:6379
      WORKSPACE_ROOT: /app/workspace/devel
      SHIBBOLETH_BASE_URL: ${SHIBBOLETH_BASE_URL:-http://shibboleth-backend:8788}
      SHIBBOLETH_UI_URL: ${SHIBBOLETH_UI_URL:-http://localhost:8097}
    gpus: all
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - knoxx-models:/models
      - knoxx-runs:/runs
      - ${DEVEL_ROOT_PATH:-../..}:/app/workspace/devel
      - knoxx-backend-node-modules:/app/workspace/devel/orgs/open-hax/knoxx/backend/node_modules
      - knoxx-backend-shadow-cljs:/app/workspace/devel/orgs/open-hax/knoxx/backend/.shadow-cljs
      - knoxx-backend-dist:/app/workspace/devel/orgs/open-hax/knoxx/backend/dist
      - knoxx-backend-m2:/root/.m2
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: ${KNOXX_BACKEND_HEALTH_START_PERIOD:-25s}
    restart: unless-stopped
    networks:
      kms-internal:
        aliases:
          - backend
      ai-infra: {}

  # ============================================================
  # KNOXX FRONTEND - built React UI (production)
  # Skipped in dev mode via profile
  # ============================================================
  knoxx-frontend:
    profiles: ["production"]
    build:
      context: ${DEVEL_ROOT_PATH:-../..}
      dockerfile: orgs/open-hax/knoxx/frontend/Dockerfile.workspace
    cpus: 1
    cpuset: "2-21"
    expose:
      - "80"
    depends_on:
      knoxx-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /usr/share/nginx/html/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - kms-internal
      - ai-infra

  # ============================================================
  # KNOXX FRONTEND DEV - Vite dev server with hot reload
  # Enable with COMPOSE_PROFILES=dev
  # Access directly at http://localhost:5173 or via nginx
  # ============================================================
  knoxx-frontend-dev:
    profiles: ["dev"]
    image: node:22-bookworm-slim
    cpus: 1
    cpuset: "2-21"
    working_dir: /app/workspace/devel/orgs/open-hax/knoxx
    command: >
      bash -lc "corepack enable pnpm && pnpm install --frozen-lockfile 2>/dev/null || pnpm install --no-frozen-lockfile && cd frontend && npx vite --host 0.0.0.0 --port 5173 --strictPort"
    expose:
      - "5173"
    ports:
      - "${KNOXX_FRONTEND_DEV_PORT:-5173}:5173"
    environment:
      CHOKIDAR_USEPOLLING: ${KNOXX_FRONTEND_CHOKIDAR_USEPOLLING:-true}
      WATCHPACK_POLLING: ${KNOXX_FRONTEND_WATCHPACK_POLLING:-true}
      VITE_KNOXX_BACKEND_URL: ${VITE_KNOXX_BACKEND_URL:-http://localhost:8000}
      VITE_KNOXX_DEV_USER_EMAIL: ${KNOXX_DEV_USER_EMAIL:-system-admin@open-hax.local}
      VITE_KNOXX_DEV_ORG_SLUG: ${KNOXX_DEV_ORG_SLUG:-open-hax}
    volumes:
      - ${DEVEL_ROOT_PATH:-../..}:/app/workspace/devel
      - knoxx-knoxx-node-modules:/app/workspace/devel/orgs/open-hax/knoxx/node_modules
      - knoxx-frontend-node-modules:/app/workspace/devel/orgs/open-hax/knoxx/frontend/node_modules
    depends_on:
      knoxx-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - kms-internal

  # ============================================================
  # SHIBBOLETH BACKEND - promptbench control plane
  # ============================================================
  shibboleth-backend:
    build:
      context: ${SHIBBOLETH_BACKEND_PATH:-../../orgs/octave-commons/shibboleth}
      dockerfile: Dockerfile.control-plane
    cpus: 1
    cpuset: "2-21"
    expose:
      - "8788"
    environment:
      PORT: "8788"
      PROXY_AUTH_TOKEN: ${PROXY_AUTH_TOKEN:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN:-}
      PROMPTBENCH_PROXY_URL: ${PROMPTBENCH_PROXY_URL:-http://host.docker.internal:8789/v1/chat/completions}
      PROMPTBENCH_RUNS_DIR: /app/data/control-plane/runs
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - shibboleth-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/127.0.0.1/8788'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    networks:
      - kms-internal
      - ai-infra

  # ============================================================
  # KM-LABELS - Corporate KM Label Bridge API
  # ============================================================
  km-labels:
    build:
      context: ${KM_LABELS_PATH:-../../packages/futuresight-kms}
      dockerfile: Dockerfile
    cpus: 1
    cpuset: "2-21"
    expose:
      - "3002"
    environment:
      <<: *shared-env
      DATABASE_URL: postgresql://${POSTGRES_USER:-kms}:${POSTGRES_PASSWORD:-kms}@postgres:5432/${POSTGRES_DB:-futuresight_kms}
      REDIS_URL: redis://redis:6379
      KM_LABELS_API_KEY: ${KM_LABELS_API_KEY:-change-me-km-labels}
      RAGUSSY_BASE_URL: http://knoxx-backend:8000
      RAGUSSY_API_KEY: ${RAGUSSY_API_KEY:-}
      OPENPLANNER_BASE_URL: ${KNOXX_OPENPLANNER_BASE_URL:-http://nginx/api/openplanner}
      OPENPLANNER_API_KEY: ${KNOXX_OPENPLANNER_API_KEY:-change-me-openplanner}
    volumes:
      - km-labels-data:/data
      - ${WORKSPACE_PATH:-../../..}:/app/workspace:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - kms-internal
      - ai-infra

  # ============================================================
  # KMS INGESTION - Clojure ingestion engine (replacing km-labels)
  # ============================================================
  kms-ingestion:
    build:
      context: ${KMS_INGESTION_PATH:-../../orgs/open-hax/knoxx/ingestion}
      dockerfile: Dockerfile
    cpus: 2
    cpuset: "2-21"
    expose:
      - "3003"
    environment:
      PORT: "3003"
      DATABASE_URL: postgresql://${POSTGRES_USER:-kms}:${POSTGRES_PASSWORD:-kms}@postgres:5432/${POSTGRES_DB:-futuresight_kms}
      REDIS_URL: redis://redis:6379
      RAGUSSY_BASE_URL: http://knoxx-backend:8000
      PROXX_BASE_URL: ${PROXX_BASE_URL:-http://host.docker.internal:8789}
      PROXX_AUTH_TOKEN: ${PROXY_AUTH_TOKEN:-}
      PROXX_DEFAULT_MODEL: ${PROXX_DEFAULT_MODEL:-glm-5}
      PROXX_CONNECTION_TIMEOUT_MS: ${PROXX_CONNECTION_TIMEOUT_MS:-15000}
      PROXX_SOCKET_TIMEOUT_MS: ${PROXX_SOCKET_TIMEOUT_MS:-180000}
      OPENPLANNER_BASE_URL: ${KNOXX_OPENPLANNER_BASE_URL:-http://nginx/api/openplanner}
      OPENPLANNER_API_KEY: ${KNOXX_OPENPLANNER_API_KEY:-change-me-openplanner}
      WORKSPACE_PATH: /app/workspace/devel
      INGEST_SCHEDULER_POLL_MS: ${INGEST_SCHEDULER_POLL_MS:-15000}
      PASSIVE_WATCH_ENABLED: ${PASSIVE_WATCH_ENABLED:-true}
      PASSIVE_WATCH_POLL_MS: ${PASSIVE_WATCH_POLL_MS:-15000}
      PASSIVE_WATCH_DEBOUNCE_MS: ${PASSIVE_WATCH_DEBOUNCE_MS:-1000}
      INGEST_BATCH_SIZE: ${INGEST_BATCH_SIZE:-24}
      INGEST_BATCH_PARALLELISM: ${INGEST_BATCH_PARALLELISM:-2}
      INGEST_THROTTLE_ENABLED: ${INGEST_THROTTLE_ENABLED:-true}
      INGEST_MAX_LOAD_PER_CORE: ${INGEST_MAX_LOAD_PER_CORE:-1.35}
      INGEST_THROTTLE_SLEEP_MS: ${INGEST_THROTTLE_SLEEP_MS:-500}
      INGEST_BATCH_DELAY_MS: ${INGEST_BATCH_DELAY_MS:-1000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${WORKSPACE_PATH:-../../..}:/app/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - kms-internal
      - ai-infra

  # ============================================================
  # POSTGRES - Metadata + Label Storage
  # ============================================================
  postgres:
    image: postgres:16-alpine
    cpus: 1
    cpuset: "2-21"
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kms}
      POSTGRES_DB: ${POSTGRES_DB:-futuresight_kms}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kms} -d ${POSTGRES_DB:-futuresight_kms}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - kms-internal

  # ============================================================
  # REDIS - Caching + Job Queues
  # ============================================================
  redis:
    image: redis:7-alpine
    cpus: 0.5
    cpuset: "2-21"
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - kms-internal

  # ============================================================
  # RAGUSSY (Optional - start manually)
  # ============================================================
  # ragussy:
  #   build:
  #     context: ${RAGUSSY_PATH:-../../orgs/mojomast/ragussy/backend}
  #     dockerfile: Dockerfile
  #   expose:
  #     - "8000"
  #     - "5173"
  #   environment:
  #     <<: *shared-env
  #   networks:
  #     - kms-internal

  # ============================================================
  # SHIBBOLETH (Optional - start manually)
  # ============================================================
  # shibboleth:
  #   build:
  #     context: ${SHIBBOLETH_PATH:-../../orgs/octave-commons/shibboleth}
  #     dockerfile: Dockerfile.control-plane
  #   expose:
  #     - "3001"
  #   environment:
  #     <<: *shared-env
  #   networks:
  #     - kms-internal

volumes:
  km-labels-data:
  knoxx-models:
  knoxx-runs:
  knoxx-backend-node-modules:
  knoxx-backend-shadow-cljs:
  knoxx-backend-dist:
  knoxx-backend-m2:
  knoxx-frontend-node-modules:
  knoxx-knoxx-node-modules:
  shibboleth-data:
  postgres-data:
  redis-data:

networks:
  kms-internal:
    driver: bridge
  ai-infra:
    external: true
