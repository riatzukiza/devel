# FutureSight KMS - Site Configuration
#
# Main UI is Knoxx frontend at /
# Stack landing page remains available at /stack/

upstream knoxx_frontend {
    server ${KNOXX_FRONTEND_UPSTREAM_HOST}:${KNOXX_FRONTEND_UPSTREAM_PORT};
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 100M;

    set $knoxx_backend_upstream knoxx-backend:8000;

    # ============================================================
    # Stack landing page preserved under /stack/
    # ============================================================
    location = /stack {
        return 301 /stack/;
    }

    location /stack/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ============================================================
    # KM Labels API (specific routes before generic /api/)
    # ============================================================
    location /api/tenants {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://km_labels/api/tenants;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/km-labels/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://km_labels/api/km-labels/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/export/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://km_labels/api/export/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # CMS API (document management)
    # ============================================================
    location /api/cms/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://km_labels/api/cms/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # Ingestion API (Clojure driver-based ingestion)
    # ============================================================
    location /api/ingestion/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://kms_ingestion/api/ingestion/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # Query API (Clojure federated lake query)
    # ============================================================
    location /api/query/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://kms_ingestion/api/query/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket for ingestion job progress
    location ~ ^/api/ingestion/ws/jobs/(.+)$ {
        proxy_pass http://kms_ingestion/api/ingestion/ws/jobs/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # ============================================================
    # OpenPlanner API - proxied behind the same nginx front door
    # ============================================================
    location = /api/openplanner {
        return 301 /api/openplanner/;
    }

    location /api/openplanner/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://openplanner_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        send_timeout 86400;
    }

    # ============================================================
    # Knoxx backend API
    # ============================================================
    location /v1/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://$knoxx_backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://$knoxx_backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        send_timeout 86400;
    }

    location /ws/ {
        proxy_pass http://$knoxx_backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # ============================================================
    # Health endpoints
    # ============================================================
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"nginx","note":"This endpoint reports nginx self-health only. Check /health/knoxx, /health/shibboleth, /health/km-labels, and /health/openplanner for dependency health."}';
    }

    location = /health/knoxx {
        access_log off;
        proxy_pass http://$knoxx_backend_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /health/shibboleth {
        access_log off;
        proxy_pass http://shibboleth_backend/api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /health/km-labels {
        access_log off;
        proxy_pass http://km_labels/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /health/openplanner {
        access_log off;
        proxy_pass http://openplanner_api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /health/postgres {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"postgres"}';
    }

    location = /health/redis {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"redis"}';
    }

    location = /ready {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ready","service":"nginx","note":"This endpoint reports nginx readiness only. Dependency health is exposed on the explicit /health/* endpoints."}';
    }

    # ============================================================
    # Main app UI - Knoxx frontend
    # ============================================================
    location / {
        proxy_pass http://knoxx_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

server {
    listen 8088;
    server_name _;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 100M;
    root /usr/share/nginx/shibboleth;
    index index.html;

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://shibboleth_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        access_log off;
        proxy_pass http://shibboleth_backend/api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
