# Development mode override for Knoxx stack
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# Or: ./start.sh --dev
#
# This enables:
# - Vite dev server on port 5173 with hot reload
# - Nginx routes to the dev surfaces with HMR WebSocket support

services:
  nginx:
    environment:
      KNOXX_FRONTEND_UPSTREAM_HOST: knoxx-frontend-dev
      KNOXX_FRONTEND_UPSTREAM_PORT: "5173"
    depends_on:
      knoxx-frontend-dev:
        condition: service_healthy

  knoxx-frontend-dev:
    profiles: []
    ports:
      - "${KNOXX_FRONTEND_DEV_PORT:-5173}:5173"
