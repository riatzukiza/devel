# Local development instance - use this as the primary proxx
# Usage: cd services/proxx && docker compose up -d

name: proxx-local

services:
  proxx:
    depends_on:
      proxx-local-db:
        condition: service_healthy
    build:
      context: ../..
      dockerfile: orgs/open-hax/proxx/Dockerfile
    ports:
      # Bind to all interfaces so containers can reach Proxx for embeddings
      - "0.0.0.0:${PROXY_PORT:-8789}:8789"
      - "127.0.0.1:${OPENAI_OAUTH_CALLBACK_PORT:-1455}:8789"
      - "127.0.0.1:${PROXY_WEB_PORT:-5174}:5174"
    environment:
      NODE_ENV: production
      PROXY_HOST: 0.0.0.0
      PROXY_PORT: "8789"
      PORT: "8789"
      OPENAI_OAUTH_CALLBACK_PORT: "${OPENAI_OAUTH_CALLBACK_PORT:-1455}"
      PROXY_AUTH_TOKEN: "${PROXY_AUTH_TOKEN:-change-me-open-hax-proxy-token}"
      # Seed credentials directory (keys.json here is for initial seeding only).
      # See seeds/README.md for details.
      PROXY_KEYS_FILE: /workspace/service-config/seeds/keys.json
      PROXY_MODELS_FILE: /workspace/service-config/models.json
      PROXY_REQUEST_LOGS_FILE: /app/data/request-logs.jsonl
      PROXY_REQUEST_LOGS_MAX_ENTRIES: "${PROXY_REQUEST_LOGS_MAX_ENTRIES:-100000}"
      PROXY_REQUEST_LOGS_FLUSH_MS: "${PROXY_REQUEST_LOGS_FLUSH_MS:-1000}"
      PROXY_PROMPT_AFFINITY_FLUSH_MS: "${PROXY_PROMPT_AFFINITY_FLUSH_MS:-250}"
      UPSTREAM_PROVIDER_ID: "${UPSTREAM_PROVIDER_ID:-openai}"
      UPSTREAM_FALLBACK_PROVIDER_IDS: "${UPSTREAM_FALLBACK_PROVIDER_IDS:-ollama-cloud,rotussy,zai,requesty}"
      DISABLED_PROVIDER_IDS: "${DISABLED_PROVIDER_IDS:-}"
      UPSTREAM_BASE_URL: "${UPSTREAM_BASE_URL:-https://chatgpt.com/backend-api}"
      UPSTREAM_PROVIDER_BASE_URLS: "${UPSTREAM_PROVIDER_BASE_URLS:-ollama-cloud=https://ollama.com,openai=https://chatgpt.com/backend-api,vivgrid=https://api.vivgrid.com,requesty=https://router.requesty.ai/v1}"
      REQUESTY_API_TOKEN: "${REQUESTY_API_TOKEN:-}"
      OPENAI_PROVIDER_ID: "${OPENAI_PROVIDER_ID:-openai}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://chatgpt.com/backend-api}"
      # Use the official OpenAI Platform API base URL for image generation (recommended).
      OPENAI_API_BASE_URL: "${OPENAI_API_BASE_URL:-https://api.openai.com}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"

      # Where to send OpenAI image generation requests:
      # - platform: api.openai.com (Images API; requires Platform scopes for OAuth)
      # - chatgpt: chatgpt.com/backend-api (ChatGPT/Codex subscription surface)
      # - auto: try platform, then fall back to chatgpt paths
      OPENAI_IMAGES_UPSTREAM_MODE: "${OPENAI_IMAGES_UPSTREAM_MODE:-auto}"

      # OpenAI OAuth configuration (browser/device flows)
      OPENAI_OAUTH_CLIENT_ID: "${OPENAI_OAUTH_CLIENT_ID:-app_EMoamEEZ73f0CkXaXp7hrann}"
      # Optional: only needed for confidential clients.
      OPENAI_OAUTH_CLIENT_SECRET: "${OPENAI_OAUTH_CLIENT_SECRET:-}"
      OPENAI_OAUTH_ISSUER: "${OPENAI_OAUTH_ISSUER:-https://auth.openai.com}"
      OPENAI_OAUTH_SCOPES: "${OPENAI_OAUTH_SCOPES:-openid profile email offline_access}"

      # If still using ChatGPT backend APIs, these are alternate paths sometimes used for image generations.
      OPENAI_IMAGES_GENERATIONS_PATHS: "${OPENAI_IMAGES_GENERATIONS_PATHS:-}"
      IMAGE_COST_USD_DEFAULT: "${IMAGE_COST_USD_DEFAULT:-0}"
      IMAGE_COST_USD_BY_PROVIDER: "${IMAGE_COST_USD_BY_PROVIDER:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://ollama:11434}"
      ZAI_API_KEY: "${ZAI_API_KEY:-}"
      ZHIPU_API_KEY: "${ZHIPU_API_KEY:-}"
      ZAI_PROVIDER_ID: "${ZAI_PROVIDER_ID:-zai}"
      ZHIPU_PROVIDER_ID: "${ZHIPU_PROVIDER_ID:-}"
      ZAI_BASE_URL: "${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4}"
      ZEN_API_KEY: "${ZEN_API_KEY:-}"
      ROTUSSY_API_KEY: "${ROTUSSY_API_KEY:-}"
      ROTUSSY_PROVIDER_ID: "${ROTUSSY_PROVIDER_ID:-rotussy}"
      ROTUSSY_BASE_URL: "${ROTUSSY_BASE_URL:-https://api.ussyco.de/v1}"
      ZHIPU_BASE_URL: "${ZHIPU_BASE_URL:-}"
      UPSTREAM_CHAT_COMPLETIONS_PATH: "${UPSTREAM_CHAT_COMPLETIONS_PATH:-/v1/chat/completions}"
      OPENAI_CHAT_COMPLETIONS_PATH: "${OPENAI_CHAT_COMPLETIONS_PATH:-/codex/responses/compact}"
      UPSTREAM_MESSAGES_PATH: "${UPSTREAM_MESSAGES_PATH:-/v1/messages}"
      UPSTREAM_MESSAGES_MODEL_PREFIXES: "${UPSTREAM_MESSAGES_MODEL_PREFIXES:-claude-}"
      UPSTREAM_MESSAGES_INTERLEAVED_THINKING_BETA: "${UPSTREAM_MESSAGES_INTERLEAVED_THINKING_BETA:-interleaved-thinking-2025-05-14}"
      UPSTREAM_RESPONSES_PATH: "${UPSTREAM_RESPONSES_PATH:-/v1/responses}"
      OPENAI_RESPONSES_PATH: "${OPENAI_RESPONSES_PATH:-/codex/responses}"
      UPSTREAM_RESPONSES_MODEL_PREFIXES: "${UPSTREAM_RESPONSES_MODEL_PREFIXES:-gpt-}"
      OPENAI_MODEL_PREFIXES: "${OPENAI_MODEL_PREFIXES:-openai/,openai:}"
      OLLAMA_CHAT_PATH: "${OLLAMA_CHAT_PATH:-/api/chat}"
      OLLAMA_MODEL_PREFIXES: "${OLLAMA_MODEL_PREFIXES:-ollama/,ollama:}"
      PROXY_KEY_RELOAD_MS: "${PROXY_KEY_RELOAD_MS:-5000}"
      PROXY_KEY_COOLDOWN_MS: "${PROXY_KEY_COOLDOWN_MS:-30000}"
      UPSTREAM_REQUEST_TIMEOUT_MS: "${UPSTREAM_REQUEST_TIMEOUT_MS:-900000}"
      UPSTREAM_STREAM_BOOTSTRAP_TIMEOUT_MS: "${UPSTREAM_STREAM_BOOTSTRAP_TIMEOUT_MS:-900000}"
      PROXY_ALLOW_UNAUTHENTICATED: "${PROXY_ALLOW_UNAUTHENTICATED:-false}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://openai_proxy:openai_proxy@proxx-local-db:5432/openai_proxy}" # pragma: allowlist secret
      VITE_ALLOWED_HOSTS: "${VITE_ALLOWED_HOSTS:-}"
      CHROMA_URL: "${CHROMA_URL:-http://host.docker.internal:8000}"
      CHROMA_COLLECTION: "${CHROMA_COLLECTION:-open_hax_proxy_sessions}"
      CHROMA_EMBED_MODEL: "${CHROMA_EMBED_MODEL:-nomic-embed-text:latest}"
      HOST_DASHBOARD_SELF_ID: "${HOST_DASHBOARD_SELF_ID:-}"
      HOST_DASHBOARD_TARGETS_JSON: "${HOST_DASHBOARD_TARGETS_JSON:-}"
      HOST_DASHBOARD_DOCKER_SOCKET_PATH: "${HOST_DASHBOARD_DOCKER_SOCKET_PATH:-/var/run/docker.sock}"
      HOST_DASHBOARD_RUNTIME_ROOT: "${HOST_DASHBOARD_RUNTIME_ROOT:-/workspace/runtime-repo}"
      HOST_DASHBOARD_REQUEST_TIMEOUT_MS: "${HOST_DASHBOARD_REQUEST_TIMEOUT_MS:-5000}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_EXPORTER_OTLP_HEADERS: "${OTEL_EXPORTER_OTLP_HEADERS:-}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-proxx-local}"
      OTEL_RESOURCE_ATTRIBUTES: "${OTEL_RESOURCE_ATTRIBUTES:-service.name=proxx-local}"

      # Federation identity for the primary node
      FEDERATION_SELF_NODE_ID: "${FEDERATION_SELF_NODE_ID:-local-primary}"
      FEDERATION_SELF_GROUP_ID: "${FEDERATION_SELF_GROUP_ID:-proxx-local}"
      FEDERATION_SELF_CLUSTER_ID: "${FEDERATION_SELF_CLUSTER_ID:-proxx-local-cluster}"
      FEDERATION_SELF_PEER_DID: "${FEDERATION_SELF_PEER_DID:-}"
      FEDERATION_SELF_PUBLIC_BASE_URL: "${FEDERATION_SELF_PUBLIC_BASE_URL:-http://proxx:8789}"
      FEDERATION_DEFAULT_OWNER_SUBJECT: "${FEDERATION_DEFAULT_OWNER_SUBJECT:-did:web:proxx.local}"
      FEDERATION_REQUEST_TIMEOUT_MS: "${FEDERATION_REQUEST_TIMEOUT_MS:-30000}"

      # Federation bridge client (dial-out): connect this node to a remote relay over WebSocket.
      # When connected, the remote relay can route /v1/* model API calls through this node
      # without requiring any inbound access to this host.
      FEDERATION_BRIDGE_RELAY_URL: "${FEDERATION_BRIDGE_RELAY_URL:-}"
      FEDERATION_BRIDGE_AUTH_TOKEN: "${FEDERATION_BRIDGE_AUTH_TOKEN:-}"
      FEDERATION_BRIDGE_AUTH_MODE: "${FEDERATION_BRIDGE_AUTH_MODE:-admin_key}"
      FEDERATION_BRIDGE_OWNER_SUBJECT: "${FEDERATION_BRIDGE_OWNER_SUBJECT:-}"
      FEDERATION_BRIDGE_AGENT_ID: "${FEDERATION_BRIDGE_AGENT_ID:-}"
      FEDERATION_BRIDGE_LABELS: "${FEDERATION_BRIDGE_LABELS:-}"
      FEDERATION_BRIDGE_NODE_LABELS: "${FEDERATION_BRIDGE_NODE_LABELS:-}"
      FEDERATION_BRIDGE_DEFAULT_EXECUTION_POLICY: "${FEDERATION_BRIDGE_DEFAULT_EXECUTION_POLICY:-node_affinity}"
    volumes:
      - ./models.json:/workspace/service-config/models.json:ro
      - ./seeds:/workspace/service-config/seeds:ro
      - ./data:/app/data
      - ./:/workspace/runtime-repo:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      default: {}
      ai-infra:
        aliases:
          - proxx
          - proxx-local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "Promise.all([fetch('http://127.0.0.1:8789/health',{headers:{Authorization:'Bearer '+(process.env.PROXY_AUTH_TOKEN||'')}}), fetch('http://127.0.0.1:5174')]).then(([proxyResponse, webResponse]) => { if (!proxyResponse.ok || !webResponse.ok) { process.exit(1); } }).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  proxx-local-db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: openai_proxy
      POSTGRES_USER: openai_proxy
      POSTGRES_PASSWORD: openai_proxy # pragma: allowlist secret
    ports:
      - "${PROXY_DB_PORT:-15432}:5432"
    volumes:
      - open-hax-openai-proxy_open-hax-openai-proxy-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openai_proxy -d openai_proxy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      default: {}
      ai-infra:
        aliases:
          - proxx-local-db

volumes:
  open-hax-openai-proxy_open-hax-openai-proxy-db-data:
    external: true

networks:
  ai-infra:
    external: true
    name: ai-infra
