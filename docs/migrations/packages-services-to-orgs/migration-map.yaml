# Source of truth for promotions into orgs and workspace runtime homes.
#
# Core fields:
# - kind: package | service
# - status: prototype | candidate-promote | canonical
# - canonical_home_type:
#   - standalone-repo
#   - existing-monorepo-package
#   - future-monorepo-package
#   - runtime-home
#   - compatibility-alias
# - provenance.classification:
#   - direct-prototype
#   - verified-extraction
#   - corpus-artifact
#   - canonical-descendant
#   - slop
#
# Notes:
# - Default birthplace for new work is packages/<name> unless explicitly overridden.
# - services/<name> is for runtime/devops/integration material, not default canonical source.
# - This file currently reflects a cautious first pass only: high-confidence package candidates
#   plus Promethean-derived verified extractions whose provenance should be preserved.

services/open-hax-openai-proxy:
