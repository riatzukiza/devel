name: eta-mu

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: eta-mu-${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  eta-mu:
    runs-on: ubuntu-latest
    env:
      ETA_MU_APP_ID: ${{ secrets.ETA_MU_APP_ID }}
      ETA_MU_APP_PRIVATE_KEY: ${{ secrets.ETA_MU_APP_PRIVATE_KEY }}
      # Open Hax proxy configuration for pi model access
      OPEN_HAX_OPENAI_PROXY_URL: ${{ vars.OPEN_HAX_OPENAI_PROXY_URL }}
      OPEN_HAX_OPENAI_PROXY_AUTH_TOKEN: ${{ secrets.OPEN_HAX_OPENAI_PROXY_AUTH_TOKEN }}
    steps:
      - name: Resolve eta-mu refs
        id: eta_mu_refs
        shell: bash
        env:
          ETA_MU_REF_MAIN: ${{ vars.ETA_MU_REF_MAIN }}
          ETA_MU_REF_STAGING: ${{ vars.ETA_MU_REF_STAGING }}
          ETA_MU_GITHUB_REF_MAIN: ${{ vars.ETA_MU_GITHUB_REF_MAIN }}
          ETA_MU_GITHUB_REF_STAGING: ${{ vars.ETA_MU_GITHUB_REF_STAGING }}
        run: |
          target_branch="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == pull_request* ]]; then
            target_branch="${GITHUB_BASE_REF}"
          fi

          eta_mu_ref="${ETA_MU_REF_MAIN:-${ETA_MU_GITHUB_REF_MAIN:-main}}"
          if [[ "$target_branch" == "staging" ]]; then
            eta_mu_ref="${ETA_MU_REF_STAGING:-${ETA_MU_GITHUB_REF_STAGING:-staging}}"
          fi

          echo "eta_mu_ref=${eta_mu_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout eta-mu logic
        uses: actions/checkout@v4
        with:
          repository: open-hax/eta-mu
          path: .eta-mu
          ref: ${{ steps.eta_mu_refs.outputs.eta_mu_ref }}

      - name: Create eta-mu app token
        id: eta_mu_token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.ETA_MU_APP_ID }}
          private-key: ${{ env.ETA_MU_APP_PRIVATE_KEY }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: .eta-mu/packages/eta-mu-github/pnpm-lock.yaml

      - name: Install eta-mu dependencies
        run: pnpm --dir .eta-mu/packages/eta-mu-github install --frozen-lockfile

      - name: Detect eta-mu model auth
        id: eta_mu_model_auth
        shell: bash
        env:
          OPEN_HAX_OPENAI_PROXY_URL: ${{ vars.OPEN_HAX_OPENAI_PROXY_URL }}
          OPEN_HAX_OPENAI_PROXY_AUTH_TOKEN: ${{ secrets.OPEN_HAX_OPENAI_PROXY_AUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ready=false
          if [[ -n "${OPEN_HAX_OPENAI_PROXY_URL:-}" && -n "${OPEN_HAX_OPENAI_PROXY_AUTH_TOKEN:-}" ]]; then
            ready=true
          elif [[ -n "${OPENAI_API_KEY:-}" || -n "${ANTHROPIC_API_KEY:-}" || -n "${GEMINI_API_KEY:-}" ]]; then
            ready=true
          fi
          echo "ready=${ready}" >> "$GITHUB_OUTPUT"

      - name: Run eta-mu event handler
        if: ${{ steps.eta_mu_model_auth.outputs.ready == 'true' }}
        env:
          GITHUB_TOKEN: ${{ steps.eta_mu_token.outputs.token != '' && steps.eta_mu_token.outputs.token || github.token }}
          ETA_MU_APP_ID: ${{ secrets.ETA_MU_APP_ID }}
          ETA_MU_APP_PRIVATE_KEY: ${{ secrets.ETA_MU_APP_PRIVATE_KEY }}
          ETA_MU_MODEL_PROVIDER: ${{ vars.ETA_MU_MODEL_PROVIDER }}
          ETA_MU_MODEL_ID: ${{ vars.ETA_MU_MODEL_ID }}
          ETA_MU_REVIEW_ACTORS: ${{ vars.ETA_MU_REVIEW_ACTORS }}
          ETA_MU_MENTION_TOKENS: ${{ vars.ETA_MU_MENTION_TOKENS }}
          ETA_MU_IGNORE_LOGINS: ${{ vars.ETA_MU_IGNORE_LOGINS }}
          # Open Hax proxy configuration
          OPEN_HAX_OPENAI_PROXY_URL: ${{ vars.OPEN_HAX_OPENAI_PROXY_URL }}
          OPEN_HAX_OPENAI_PROXY_AUTH_TOKEN: ${{ secrets.OPEN_HAX_OPENAI_PROXY_AUTH_TOKEN }}
          # Fallback provider keys
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PI_CODING_AGENT_DIR: ${{ github.workspace }}/.eta-mu/.pi/agent
        run: >-
          pnpm --dir .eta-mu/packages/eta-mu-github dev run-event
          --repo "${GITHUB_REPOSITORY}"
          --event-name "${GITHUB_EVENT_NAME}"
          --event-path "${GITHUB_EVENT_PATH}"
          --cwd "$PWD"

      - name: Skip eta-mu event handler when no model auth is configured
        if: ${{ steps.eta_mu_model_auth.outputs.ready != 'true' }}
        run: echo "Skipping eta-mu event handling because no model auth is configured for this repo."